apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  labels:
    tier: backend
    app: redis-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
        - name: master-redis-nautilus
          image: redis:latest
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  labels:
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: redis-master
  ports:
    - port: 6379
      targetPort: 6379
