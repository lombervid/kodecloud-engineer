apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drupal-web
  template:
    metadata:
      labels:
        app: drupal-web
    spec:
      containers:
        - name: drupal-container
          image: drupal:8.6
---
apiVersion: v1
kind: Service
metadata:
  name: drupal-service
spec:
  type: NodePort
  selector:
    app: drupal-web
  ports:
    - port: 80
      nodePort: 30095
